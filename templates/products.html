<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karavan Market — Products</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:   { 900: '#0F211D', 800: '#16302A', 700: '#1E3B33', 600: '#2A4E44' },
          paper: { 50: '#F6F5F0', 100: '#EFEEE7', 200: '#E4E2D8' },
          brand: { 400: '#FDBB3D', 500: '#FCAB10', 600: '#E0960C', 700: '#A66E08' },
          pine:  { 500: '#3E7C6A', 600: '#336657', 700: '#2A5548' },
          rust:  { 500: '#C1483A', 600: '#A83B2F' },
        },
        fontFamily: {
          display: ['"Space Grotesk"', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D8D5C8; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #C7C3B2; }

  .nav-item[data-active="true"] {
    background-color: #16302A;
    color: #FCAB10;
  }

  .cat-pill[data-active="true"] {
    background-color: #16302A;
    color: #F6F5F0;
    border-color: #16302A;
  }

  :focus-visible { outline: 2px solid #FCAB10; outline-offset: 2px; }

  tbody tr:hover { background-color: #F6F5F0; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>

<body class="font-body bg-paper-50 text-ink-900 h-screen overflow-hidden">

<div class="flex h-screen">

  <!-- ============ SIDEBAR ============ -->
  <aside class="w-44 shrink-0 bg-ink-900 text-paper-100 flex flex-col py-6 px-3">
    <div class="px-2 mb-8">
      <p class="font-display font-semibold tracking-wide text-paper-50">KARAVAN</p>
      <p class="text-[10px] tracking-widest text-paper-100/40 uppercase">Market</p>
    </div>

    <nav class="flex flex-col gap-1">
      <a href="{% url 'dashboard' %}" data-active="false" class="nav-item px-3 py-2.5 rounded-lg text-sm font-medium text-paper-100/50 hover:text-paper-100 hover:bg-ink-800 transition">Dashboard</a>
      <a href="{% url 'pos' %}" data-active="false" class="nav-item px-3 py-2.5 rounded-lg text-sm font-medium text-paper-100/50 hover:text-paper-100 hover:bg-ink-800 transition">Point of Sale</a>
      <a href="{% url 'products' %}" data-active="true" class="nav-item px-3 py-2.5 rounded-lg text-sm font-semibold transition">Products</a>
      <a href="#" data-active="false" class="nav-item px-3 py-2.5 rounded-lg text-sm font-medium text-paper-100/50 hover:text-paper-100 hover:bg-ink-800 transition">Expenses</a>
    </nav>

  </aside>

  <!-- ============ MAIN ============ -->
  <div class="flex-1 min-w-0 flex flex-col">

    <!-- Top bar -->
    <header class="px-8 pt-6 pb-4 shrink-0">
      <div class="flex items-start justify-between gap-6 flex-wrap">
        <div>
          <h1 class="font-display text-2xl font-semibold text-ink-900">Products</h1>
          <!-- <p class="text-sm text-ink-900/50 mt-0.5">23 products · <span class="text-rust-500">5 below reorder point</span></p> -->
        </div>
        <a href="{% url 'product_add' %}" class="px-4 py-2.5 rounded-xl bg-pine-600 hover:bg-pine-700 text-white text-sm font-semibold transition">+ Add product</a>
      </div>

      <div class="mt-5 flex items-center gap-3 flex-wrap">
        <input type="text" placeholder="Search by name or barcode…"
          class="w-full max-w-xs px-4 py-2.5 rounded-xl bg-white border border-paper-200 text-sm placeholder:text-ink-900/35 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
    </header>

    <!-- Table -->
    <div class="flex-1 overflow-y-auto px-8 pb-8">
      <div class="bg-white border border-paper-200 rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-paper-200">
              <th class="text-left px-6 py-3 text-[11px] uppercase tracking-widest text-ink-900/40 font-semibold">Product</th>
              <th class="text-left px-6 py-3 text-[11px] uppercase tracking-widest text-ink-900/40 font-semibold">Barcode / PLU</th>
              <th class="text-left px-6 py-3 text-[11px] uppercase tracking-widest text-ink-900/40 font-semibold">Price</th>
              <th class="text-left px-6 py-3 text-[11px] uppercase tracking-widest text-ink-900/40 font-semibold w-52">Stock</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-paper-200">
            {% for product in products %}
            <tr onclick="window.location.href='{% url 'product_detail' product.id %}'" class="cursor-pointer">
              <td class="px-6 py-3.5 font-medium text-ink-900 hover:text-brand-600">{{ product.name }}</td>
              <td class="px-6 py-3.5 font-mono text-ink-900/50">{{ product.barcode }}</td>
              <td class="px-6 py-3.5 font-mono text-left text-ink-900">{{ product.sales_price }} UZS</td>
              <td class="px-6 py-3.5 font-mono text-left text-ink-900">{{ product.qty }}</td>

            </tr>
            {% endfor %}

          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
